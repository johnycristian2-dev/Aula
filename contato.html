<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Johny Cristian Bolis | Contato</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-container">
        <a href="index.html" class="logo">JCB</a>
        <ul class="nav-links">
          <li><a href="index.html">Início</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="projetos.html">Projetos</a></li>
          <li><a href="marketplace.html">Marketplace</a></li>
          <li><a href="contato.html" class="active">Contato</a></li>
          <li><a href="links.html">Links</a></li>
          <li>
            <a
              href="https://github.com/johnycristian2-dev"
              target="_blank"
              class="nav-github"
              >GitHub</a
            >
          </li>
          <li>
            <button
              id="themeToggle"
              class="theme-toggle"
              type="button"
              aria-label="Alternar modo escuro"
            >
              Modo escuro
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="page-header">
      <div class="container">
        <h1>Contato</h1>
        <p>Vamos conversar? Manda uma mensagem!</p>
      </div>
    </div>

    <section class="contato">
      <div class="container">
        <div class="contato-content">
          <form class="contato-form" id="contatoForm">
            <div class="form-group">
              <label for="nome">Nome *</label>
              <input type="text" id="nome" name="nome" required />
            </div>
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="mensagem">Mensagem *</label>
              <textarea
                id="mensagem"
                name="mensagem"
                rows="5"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
          </form>

          <div class="redes-sociais">
            <h3>Redes Sociais</h3>
            <div class="sociais-links">
              <a href="#" class="social-link" title="LinkedIn">
                <span>LinkedIn</span>
                <span class="maintenance">🔧 Em manutenção</span>
              </a>
              <a href="#" class="social-link" title="Instagram">
                <span>Instagram</span>
                <span class="maintenance">🔧 Em manutenção</span>
              </a>
              <a href="#" class="social-link" title="Twitter">
                <span>Twitter</span>
                <span class="maintenance">🔧 Em manutenção</span>
              </a>
              <a
                href="https://github.com/johnycristian2-dev"
                target="_blank"
                class="social-link"
                title="GitHub"
              >
                <span>GitHub</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <p class="copyright">
          &copy; 2026 Johny Cristian Bolis. Todos os direitos reservados.
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
