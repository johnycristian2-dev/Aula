<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Johny Cristian Bolis | Em destaque</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-container">
        <a href="index.html" class="logo">JCB</a>
        <ul class="nav-links">
          <li><a href="index.html">Início</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="projetos.html">Projetos</a></li>
          <li><a href="marketplace.html">Marketplace</a></li>
          <li><a href="destaque.html" class="active">Em destaque</a></li>
          <li><a href="contato.html">Cadastro</a></li>
          <li><a href="links.html">Links</a></li>
          <li>
            <a
              href="https://github.com/johnycristian2-dev"
              target="_blank"
              class="nav-github"
              >GitHub</a
            >
          </li>
          <li>
            <button
              id="themeToggle"
              class="theme-toggle"
              type="button"
              aria-label="Alternar modo escuro"
            >
              Modo escuro
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="page-header featured-header">
      <div class="container">
        <h1>Em destaque</h1>
        <p>Produtos com API, cache local e fallback inteligente</p>
      </div>
    </div>

    <section class="featured-page">
      <div class="container">
        <div class="featured-toolbar">
          <div class="featured-field">
            <label for="featuredNameFilter">Filtrar por nome</label>
            <input
              type="text"
              id="featuredNameFilter"
              placeholder="Ex.: notebook"
            />
          </div>

          <div class="featured-field">
            <label for="featuredPriceFilter">Filtrar por preço</label>
            <select id="featuredPriceFilter">
              <option value="all">Todos os preços</option>
              <option value="0-199">Até R$ 199</option>
              <option value="200-799">R$ 200 a R$ 799</option>
              <option value="800+">R$ 800 ou mais</option>
            </select>
          </div>
        </div>

        <div class="featured-feedback">
          <p id="featuredStatus" class="featured-status">
            Carregando produtos...
          </p>
          <p id="featuredCount" class="featured-count"></p>
        </div>

        <div id="featuredGrid" class="featured-grid" aria-live="polite"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <p class="copyright">
          &copy; 2026 Johny Cristian Bolis. Todos os direitos reservados.
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
